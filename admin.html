<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة - FOREVER Store</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      color: #333;
    }

    /* ── Login ── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 8px 30px rgba(0,0,0,.12);
      text-align: center;
    }
    .login-card .logo { font-size: 48px; margin-bottom: 12px; }
    .login-card h2 { color: #c8536e; margin-bottom: 6px; }
    .login-card p  { color: #888; font-size: 14px; margin-bottom: 28px; }
    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .login-card input:focus { border-color: #c8536e; }
    .login-card button {
      width: 100%;
      padding: 13px;
      background: #c8536e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background .2s;
    }
    .login-card button:hover { background: #b0425c; }
    #loginError {
      color: #ef4444;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    header {
      background: #c8536e;
      color: #fff;
      padding: 16px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header h1 { font-size: 20px; }
    header .logout-btn {
      background: rgba(255,255,255,.2);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background .2s;
    }
    header .logout-btn:hover { background: rgba(255,255,255,.35); }

    .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .stat-card .stat-num { font-size: 32px; font-weight: bold; color: #c8536e; }
    .stat-card .stat-label { font-size: 13px; color: #888; margin-top: 4px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .toolbar h2 { font-size: 18px; flex: 1; }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 2px solid #e5e7eb;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: all .2s;
    }
    .filter-btn.active,
    .filter-btn:hover { border-color: #c8536e; color: #c8536e; background: #fdf2f5; }
    .refresh-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: none;
      background: #c8536e;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    /* ── Orders list ── */
    #ordersContainer .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 16px;
    }

    .order-card {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }

    .order-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
    }
    .order-id { font-weight: bold; color: #c8536e; font-size: 14px; min-width: 160px; }
    .order-customer { flex: 1; }
    .order-customer strong { display: block; font-size: 15px; }
    .order-customer span  { font-size: 13px; color: #888; }
    .order-total { font-weight: bold; font-size: 16px; color: #333; min-width: 110px; text-align: center; }
    .order-date  { font-size: 12px; color: #aaa; min-width: 90px; text-align: center; }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      min-width: 90px;
      text-align: center;
    }
    .badge.pending   { background: #fef0e8; color: #e8722a; }
    .badge.completed { background: #f0fdf4; color: #16a34a; }
    .badge.cancelled { background: #fef2f2; color: #dc2626; }

    .chevron { color: #aaa; font-size: 18px; transition: transform .25s; }
    .order-card.open .chevron { transform: rotate(180deg); }

    .order-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid #f3f4f6;
    }
    .order-card.open .order-body { display: block; }

    .order-body-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 16px;
    }
    @media(max-width: 600px) { .order-body-grid { grid-template-columns: 1fr; } }

    .info-block h4 { font-size: 13px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .info-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 14px; }
    .info-row .lbl { color: #888; min-width: 70px; }

    .items-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    .items-table th { background: #f9f0f3; padding: 8px 12px; text-align: right; font-size: 12px; color: #888; }
    .items-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
    .items-table tr:last-child td { border-bottom: none; }

    .status-actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .status-actions span { font-size: 13px; color: #888; }
    .btn-status {
      padding: 7px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: opacity .2s;
    }
    .btn-status:hover { opacity: .85; }
    .btn-status.complete  { background: #dcfce7; color: #16a34a; }
    .btn-status.cancel    { background: #fef2f2; color: #dc2626; }
    .btn-status.pending   { background: #fef0e8; color: #e8722a; }
    .btn-status:disabled  { opacity: .4; cursor: default; }

    #loadingMsg { text-align: center; padding: 60px; color: #aaa; font-size: 16px; }
  </style>
</head>
<body>

<!-- ── Login ───────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">🌿</div>
    <h2>FOREVER Store</h2>
    <p>لوحة إدارة الطلبات</p>
    <input type="password" id="apiKeyInput" placeholder="أدخل كلمة المرور" />
    <button onclick="login()">دخول</button>
    <p id="loginError">كلمة المرور غير صحيحة</p>
  </div>
</div>

<!-- ── Dashboard ─────────────────────────────────────────────── -->
<div id="dashboard">
  <header>
    <h1>🛍️ FOREVER Store — لوحة الإدارة</h1>
    <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
  </header>

  <div class="main">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-label">إجمالي الطلبات</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statPending">—</div>
        <div class="stat-label">قيد الانتظار</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statCompleted">—</div>
        <div class="stat-label">مكتملة</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statRevenue">—</div>
        <div class="stat-label">إجمالي المبيعات (درهم)</div>
      </div>
    </div>

    <div class="toolbar">
      <h2>الطلبات</h2>
      <button class="filter-btn active" data-filter="all"       onclick="setFilter('all',this)">الكل</button>
      <button class="filter-btn"        data-filter="pending"   onclick="setFilter('pending',this)">انتظار</button>
      <button class="filter-btn"        data-filter="completed" onclick="setFilter('completed',this)">مكتملة</button>
      <button class="filter-btn"        data-filter="cancelled" onclick="setFilter('cancelled',this)">ملغاة</button>
      <button class="refresh-btn"       onclick="loadOrders()">↻ تحديث</button>
    </div>

    <div id="ordersContainer">
      <div id="loadingMsg">جاري التحميل…</div>
    </div>
  </div>
</div>

<script>
  const API = 'backend.php';
  let apiKey  = '';
  let allOrders = [];
  let activeFilter = 'all';

  // ── Auth ──────────────────────────────────────────────────────────────────

  function login() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    apiKey = key;
    loadOrders();
  }

  document.getElementById('apiKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function logout() {
    apiKey = '';
    allOrders = [];
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display   = 'none';
    document.getElementById('apiKeyInput').value = '';
    document.getElementById('loginError').style.display  = 'none';
  }

  // ── Load orders ───────────────────────────────────────────────────────────

  async function loadOrders() {
    document.getElementById('loadingMsg') && (document.getElementById('ordersContainer').innerHTML = '<div id="loadingMsg">جاري التحميل…</div>');
    try {
      const res    = await fetch(`${API}?action=get-orders&key=${encodeURIComponent(apiKey)}`);
      const result = await res.json();

      if (!result.success) {
        if (res.status === 401) {
          document.getElementById('loginError').style.display = 'block';
          return;
        }
        showError('فشل تحميل الطلبات');
        return;
      }

      // Auth passed — show dashboard
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display   = 'block';
      document.getElementById('loginError').style.display  = 'none';

      allOrders = result.data || [];
      updateStats();
      renderOrders();

    } catch (err) {
      showError('تعذّر الاتصال بالخادم');
    }
  }

  // ── Stats ─────────────────────────────────────────────────────────────────

  function updateStats() {
    const pending   = allOrders.filter(o => o.status === 'pending').length;
    const completed = allOrders.filter(o => o.status === 'completed').length;
    const revenue   = allOrders
      .filter(o => o.status !== 'cancelled')
      .reduce((s, o) => s + (o.total || 0), 0);

    document.getElementById('statTotal').textContent     = allOrders.length;
    document.getElementById('statPending').textContent   = pending;
    document.getElementById('statCompleted').textContent = completed;
    document.getElementById('statRevenue').textContent   = revenue.toLocaleString('ar-MA');
  }

  // ── Filter ────────────────────────────────────────────────────────────────

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function renderOrders() {
    const container = document.getElementById('ordersContainer');
    const list = activeFilter === 'all'
      ? allOrders
      : allOrders.filter(o => o.status === activeFilter);

    if (!list.length) {
      container.innerHTML = '<div class="empty-state">📭 لا توجد طلبات</div>';
      return;
    }

    container.innerHTML = list.map(order => orderCard(order)).join('');
  }

  function orderCard(o) {
    const dateStr = o.created_at
      ? new Date(o.created_at).toLocaleDateString('ar-MA', { year:'numeric', month:'short', day:'numeric' })
      : '—';

    const itemRows = (o.items || []).map(i =>
      `<tr><td>${i.name}</td><td style="text-align:center;">${i.qty}</td><td style="text-align:left;">${i.price} درهم</td></tr>`
    ).join('');

    const disableComplete  = o.status === 'completed'  ? 'disabled' : '';
    const disableCancel    = o.status === 'cancelled'   ? 'disabled' : '';
    const disablePending   = o.status === 'pending'     ? 'disabled' : '';

    return `
    <div class="order-card" id="card-${o.id}">
      <div class="order-header" onclick="toggleCard('${o.id}')">
        <div class="order-id">${o.id}</div>
        <div class="order-customer">
          <strong>${o.name}</strong>
          <span>${o.phone}</span>
        </div>
        <div class="order-total">${(o.total || 0).toLocaleString('ar-MA')} درهم</div>
        <div class="order-date">${dateStr}</div>
        <span class="badge ${o.status}">${statusLabel(o.status)}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="order-body">
        <div class="order-body-grid">
          <div class="info-block">
            <h4>بيانات العميل</h4>
            <div class="info-row"><span class="lbl">الاسم</span><span>${o.name}</span></div>
            <div class="info-row"><span class="lbl">الهاتف</span><span>${o.phone}</span></div>
            <div class="info-row"><span class="lbl">المدينة</span><span>${o.city || '—'}</span></div>
            <div class="info-row"><span class="lbl">العنوان</span><span>${o.address || '—'}</span></div>
          </div>
          <div class="info-block">
            <h4>المنتجات</h4>
            <table class="items-table">
              <thead><tr><th>المنتج</th><th style="text-align:center;">الكمية</th><th style="text-align:left;">السعر</th></tr></thead>
              <tbody>${itemRows || '<tr><td colspan="3" style="color:#aaa;text-align:center;">—</td></tr>'}</tbody>
            </table>
          </div>
        </div>
        <div class="status-actions">
          <span>تغيير الحالة:</span>
          <button class="btn-status complete"  ${disableComplete} onclick="changeStatus('${o.id}','completed')">✅ مكتمل</button>
          <button class="btn-status cancel"    ${disableCancel}   onclick="changeStatus('${o.id}','cancelled')">❌ ملغي</button>
          <button class="btn-status pending"   ${disablePending}  onclick="changeStatus('${o.id}','pending')">🕐 انتظار</button>
        </div>
      </div>
    </div>`;
  }

  function statusLabel(s) {
    return s === 'pending' ? 'انتظار' : s === 'completed' ? 'مكتمل' : 'ملغي';
  }

  function toggleCard(id) {
    document.getElementById('card-' + id).classList.toggle('open');
  }

  // ── Update status ─────────────────────────────────────────────────────────

  async function changeStatus(orderId, newStatus) {
    try {
      const res = await fetch(`${API}?action=update-status&key=${encodeURIComponent(apiKey)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: orderId, status: newStatus }),
      });
      const result = await res.json();
      if (result.success) {
        const order = allOrders.find(o => o.id === orderId);
        if (order) order.status = newStatus;
        updateStats();
        renderOrders();
        // Re-open the card that was just updated
        setTimeout(() => {
          const card = document.getElementById('card-' + orderId);
          if (card) card.classList.add('open');
        }, 50);
      } else {
        alert('فشل تحديث الحالة');
      }
    } catch (err) {
      alert('خطأ في الاتصال بالخادم');
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function showError(msg) {
    document.getElementById('ordersContainer').innerHTML =
      `<div class="empty-state" style="color:#ef4444;">⚠️ ${msg}</div>`;
  }
</script>
</body>
</html>
